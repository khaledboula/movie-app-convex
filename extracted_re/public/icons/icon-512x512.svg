<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="128" fill="#000000"/>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="premiumGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4d4d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b0000;stop-opacity:1" />
    </linearGradient>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Cinematic Border -->
  <rect x="20" y="20" width="472" height="472" rx="110" stroke="#dc2626" stroke-width="2" stroke-opacity="0.3" fill="none" />
  
  <!-- Main Content -->
  <g filter="url(#textGlow)">
    <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="url(#premiumGradient)" style="font-family: 'Segoe UI', Arial, sans-serif; font-weight: 900; font-style: italic; font-size: 85px; letter-spacing: -4px;">CINEVERSE+</text>
  </g>
  
  <!-- Accent Line -->
  <rect x="140" y="310" width="232" height="4" rx="2" fill="#dc2626" fill-opacity="0.6" filter="url(#glow)" />
</svg>
